<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Hotel HMS</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/layout.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- AUTH (IMPORTANT) -->
    <script src="../assets/auth.js"></script>
    <script>
        Auth.requireAuth();
    </script>
</head>

<body>

<!-- Sidebar + Topbar -->
<div id="sidebar"></div>
<div id="topbar"></div>

<!-- Main Content -->
<div class="content">

    <h1>Dashboard</h1>

    <!-- Stats Cards -->
    <div class="cards">

        <div class="card">
            <h3>Today Check-ins</h3>
            <h2 id="checkins">0</h2>
        </div>

        <div class="card">
            <h3>Check-outs</h3>
            <h2 id="checkouts">0</h2>
        </div>

        <div class="card">
            <h3>Pending Bookings</h3>
            <h2 id="pending">0</h2>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h2 id="revenue">₹0</h2>
        </div>

    </div>

    <!-- Recent Bookings -->
    <div style="margin-top:40px;">
        <h2>Recent Bookings</h2>

        <table>
            <thead>
                <tr>
                    <th>Guest</th>
                    <th>Room</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="bookingTable">
                <tr>
                    <td colspan="3">No Bookings Yet</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- JS Components -->
<script src="../assets/sidebar.js"></script>
<script src="../assets/topbar.js"></script>

<script src="../assets/firebase-bookings.js"></script>

</body>
</html>
