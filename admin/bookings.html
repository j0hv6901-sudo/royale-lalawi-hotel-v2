<body>

<div class="dashboard">

<!-- Sidebar -->

<aside class="sidebar">

<h2>Royale Lalawi</h2>
<p>Hotel Management</p>

<nav>

<a href="dashboard.html">
<i class="fas fa-chart-line"></i>

</a>

<a href="bookings.html" class="active">

</nav>

</aside>

<!-- Main Content -->

<main class="content">

<div class="topbar">

<h1>Booking Management</h1>

<button>+ New Booking</button>

</div>

<!-- Search -->

<div class="search-box">

<input
type="text"
placeholder="Search Guest Name...">

<select>

<option>All Status</option>
<option>Pending</option>
<option>Confirmed</option>
<option>Cancelled</option>

</select>

</div>

<!-- Booking Table -->

<div class="recent-bookings">

<table>

<thead>

<tr>

<th>ID</th>
<th>Guest</th>
<th>Room</th>
<th>Check In</th>
<th>Check Out</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>RLH001</td>

<td>John Doe</td>

<td>Deluxe Room</td>

<td>20 Jul</td>

<td>22 Jul</td>

<td>

<span class="pending">

Pending

</span>

</td>

<td>

<button class="confirm-btn">

Confirm

</button>

<button class="reject-btn">

Reject

</button>

</td>

</tr>

<tr>

<td>RLH002</td>

<td>Mary Smith</td>

<td>Executive Twin</td>

<td>24 Jul</td>

<td>26 Jul</td>

<td>

<span class="confirmed">

Confirmed

</span>

</td>

<td>

<button class="edit-btn">

Edit

</button>

<button class="delete-btn">

Delete

</button>

</td>

</tr>

</tbody>

</table>

</div>

</main>

</div>

<script src="../js/admin.js"></script>
