<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rooms | Hotel HMS</title>

    <link rel="stylesheet" href="../assets/layout.css">

    <!-- Auth -->
    <script src="../assets/auth.js"></script>
    <script>Auth.requireAuth();</script>
</head>

<body>

<!-- Sidebar + Topbar -->
<div id="sidebar"></div>
<div id="topbar"></div>

<div class="content">

    <h1>Room Management</h1>

    <!-- ADD ROOM FORM -->
    <div style="margin: 20px 0;">
        <input id="roomName" placeholder="Room Name">
        <input id="roomPrice" placeholder="Price">
        <input id="roomCapacity" placeholder="Capacity">

        <button onclick="createRoom()">Add Room</button>
    </div>

    <!-- ROOMS TABLE -->
    <table border="1" width="100%" cellspacing="0" cellpadding="10">
        <thead>
            <tr>
                <th>Room</th>
                <th>Price</th>
                <th>Capacity</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="roomsTable">
            <tr>
                <td colspan="5">Loading rooms...</td>
            </tr>
        </tbody>
    </table>

</div>

<!-- UI SCRIPTS -->
<script src="../assets/sidebar.js"></script>
<script src="../assets/topbar.js"></script>

<!-- FIREBASE ROOMS SYSTEM (ONLY DATA LAYER) -->
<script src="../assets/firebase-rooms.js"></script>

<!-- ADD ROOM FUNCTION -->
<script>
function createRoom() {
    const name = document.getElementById("roomName").value;
    const price = document.getElementById("roomPrice").value;
    const capacity = document.getElementById("roomCapacity").value;

    if (!name || !price || !capacity) {
        alert("Please fill all fields");
        return;
    }

    addRoom(name, price, capacity);

    document.getElementById("roomName").value = "";
    document.getElementById("roomPrice").value = "";
    document.getElementById("roomCapacity").value = "";
}
</script>

</body>
</html>
