<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Hotel HMS</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/layout.css">

    <!-- Fonts (optional) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- Sidebar + Topbar injected here -->
<div id="sidebar"></div>
<div id="topbar"></div>

<!-- Main Content -->
<div class="content">

    <h1>Dashboard</h1>

    <!-- Stats Cards -->
    <div style="
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:20px;
        margin-top:20px;
    ">

        <div style="background:white; padding:20px; border-radius:10px;">
            <h3>Today Check-ins</h3>
            <h2 id="checkins">0</h2>
        </div>

        <div style="background:white; padding:20px; border-radius:10px;">
            <h3>Check-outs</h3>
            <h2 id="checkouts">0</h2>
        </div>

        <div style="background:white; padding:20px; border-radius:10px;">
            <h3>Pending Bookings</h3>
            <h2 id="pending">0</h2>
        </div>

        <div style="background:white; padding:20px; border-radius:10px;">
            <h3>Revenue</h3>
            <h2 id="revenue">₹0</h2>
        </div>

    </div>

    <!-- Recent Bookings -->
    <div style="margin-top:40px;">
        <h2>Recent Bookings</h2>

        <table style="width:100%; background:white; border-collapse:collapse; margin-top:10px;">
            <thead>
                <tr style="text-align:left; background:#f1f1f1;">
                    <th style="padding:10px;">Guest</th>
                    <th style="padding:10px;">Room</th>
                    <th style="padding:10px;">Status</th>
                </tr>
            </thead>

            <tbody id="bookingTable">
                <tr>
                    <td style="padding:10px;" colspan="3">No Bookings Yet</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- JS Components -->
<script src="../assets/sidebar.js"></script>
<script src="../assets/topbar.js"></script>

</body>
</html>
